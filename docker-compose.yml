version: '3.8'
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true" # ✅ Garante criação de tópicos sem erro

  debezium:
    image: debezium/connect:2.5
    depends_on:
      - kafka
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # SERVIÇO: Orquestrador FastAPI (RAG)
  fastapi:
    build: .
    container_name: fastapi_rag
    restart: unless-stopped
    env_file: .env
    depends_on:
      - kafka
    extra_hosts:
      - "host.docker.internal:host-gateway" # Permite acesso ao SQL Server local
    volumes:
      - .:/app
    working_dir: /app
    command: uvicorn orquestrador:app --host 0.0.0.0 --port 8000 --reload
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fastapi.rule=PathPrefix(`/chat`)"
      - "traefik.http.routers.fastapi.entrypoints=web"
      - "traefik.http.services.fastapi.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.fastapi-limit.ratelimit.average=15"
      - "traefik.http.middlewares.fastapi-limit.ratelimit.period=1m"
      - "traefik.http.middlewares.fastapi-limit.ratelimit.burst=5"
      - "traefik.http.routers.fastapi.middlewares=fastapi-limit"

  # SERVIÇO: Motor de Processamento de PDFs (Ingestão RAG)
  pdf_engine:
    build: .
    container_name: pdf_engine_rag
    restart: unless-stopped
    env_file: .env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    depends_on:
      - kafka
      - debezium
    volumes:
      - .:/app
      # MONTAGEM DE PDFs: 
      # Mapeia a pasta de PDFs do host para /app/data no container
      # AJUSTE AQUI: Mude o caminho da esquerda para a sua pasta real de PDFs
      - .:/app/data 
    command: python main.py

  # SERVIÇO: API Gateway (Traefik) - Rate Limiting & Proxy
  traefik:
    image: traefik:v2.10
    container_name: traefik_gateway
    command:
      - "--api.insecure=true" # Habilita o Dashboard na porta 8080
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:8000" # Traefik assume a porta 8000
    ports:
      - "8000:8000" # Porta de entrada única (o Moodle bate aqui)
      - "8080:8080" # Dashboard visual
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
